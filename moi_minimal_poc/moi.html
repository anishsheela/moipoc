<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOI — My Own Information</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #060e1a;
      --surface:   #131f2e;
      --surface2:  #1b2d3e;
      --border:    rgba(0,180,216,.15);
      --border2:   rgba(255,255,255,.06);
      --accent:    #00b4d8;
      --accent2:   #0077a8;
      --success:   #06d6a0;
      --text:      #e8f4f8;
      --text-mid:  #a8c4d0;
      --text-muted:#6a8a99;
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(rgba(0,180,216,.07) 1px, transparent 1px);
      background-size: 28px 28px; pointer-events: none; z-index: 0;
    }
    #app { position: relative; z-index: 1; }

    .screen { min-height: 100vh; display: flex; flex-direction: column; animation: fadeUp .25s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; background: rgba(13,27,42,.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .brand-text { font-size: 15px; font-weight: 700; color: var(--text-mid); }
    .brand-moi  { color: var(--accent); font-weight: 900; }

    .cert-chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 12px; border-radius: 999px;
      background: rgba(0,180,216,.08); border: 1px solid rgba(0,180,216,.2);
      font-size: 11.5px; font-weight: 600; color: var(--text-muted); font-family: monospace;
    }
    .cert-chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; box-shadow: 0 0 6px var(--success); }

    .btn-logout {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border2);
      background: rgba(255,255,255,.04); color: var(--text-muted);
      font-size: 12.5px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all .15s;
    }
    .btn-logout:hover { border-color: rgba(239,71,111,.3); color: #ef476f; background: rgba(239,71,111,.06); }

    /* ── Login ── */
    .login-wrap { display: flex; align-items: center; justify-content: center; flex: 1; padding: 40px 24px; }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 36px; max-width: 420px; width: 100%;
      box-shadow: 0 16px 64px rgba(0,0,0,.5); text-align: center;
    }
    .login-card h1 { font-size: 22px; font-weight: 800; color: var(--text); margin: 16px 0 10px; }
    .login-card p  { font-size: 13.5px; color: var(--text-muted); line-height: 1.6; margin-bottom: 24px; }

    .user-card {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 12px; width: 100%;
      border: 1.5px solid var(--border2); background: rgba(255,255,255,.03);
      cursor: pointer; font-family: inherit; text-align: left;
      transition: border-color .15s, background .15s;
    }
    .user-card:hover { border-color: var(--border); }
    .user-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: #fff;
    }
    .user-name  { font-size: 13.5px; font-weight: 700; color: var(--text); }
    .user-cert  { font-size: 11px; color: var(--text-muted); font-family: monospace; margin-top: 1px; }

    .cert-detect {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; background: rgba(6,214,160,.06);
      border: 1px solid rgba(6,214,160,.25); border-radius: 12px; text-align: left;
    }
    .cert-detect strong { display: block; font-size: 13px; font-weight: 700; color: var(--success); margin-bottom: 2px; }
    .cert-detect span   { font-size: 11.5px; color: var(--text-muted); font-family: monospace; }

    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 700; font-family: inherit;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; box-shadow: 0 4px 20px rgba(0,180,216,.3); transition: all .15s;
    }
    .btn-primary:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .45; cursor: default; transform: none; }

    .enc-note {
      margin-top: 18px; padding: 12px 14px;
      background: rgba(0,180,216,.04); border: 1px solid rgba(0,180,216,.1);
      border-radius: 9px; font-size: 12px; color: var(--text-muted); text-align: left; line-height: 1.55;
    }
    .enc-note strong { color: var(--accent); display: block; margin-bottom: 3px; }

    /* ── Verify steps ── */
    .verify-area {
      margin-bottom: 20px; background: rgba(0,0,0,.2);
      border: 1px solid var(--border2); border-radius: 14px; padding: 20px; text-align: left;
    }
    .verify-title {
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px;
      color: var(--text-muted); margin-bottom: 16px; text-align: center;
    }
    .verify-step {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 0; font-size: 13px; color: var(--text-muted);
      border-bottom: 1px solid rgba(255,255,255,.04); transition: color .3s;
    }
    .verify-step:last-child { border-bottom: none; }
    .verify-step.active { color: var(--text-mid); }
    .verify-step.done   { color: var(--success); }
    .step-icon { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .step-icon.pending  { background: rgba(255,255,255,.06); }
    .step-icon.spinning { background: rgba(0,180,216,.12); }
    .step-icon.done     { background: rgba(6,214,160,.15); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-ring { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(0,180,216,.2); border-top-color: var(--accent); animation: spin .7s linear infinite; }
    .verify-bar-track  { height: 3px; background: rgba(255,255,255,.06); border-radius: 99px; margin-top: 16px; overflow: hidden; }
    .verify-bar-fill   { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 99px; width: 0%; transition: width .5s ease; }

    /* ── Dashboard ── */
    .screen-body { flex: 1; max-width: 680px; margin: 0 auto; padding: 40px 24px 60px; width: 100%; }
    .section-title {
      font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--text-muted); margin-bottom: 14px; margin-top: 32px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border2); }
    .section-title:first-of-type { margin-top: 0; }

    .profile-header {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; display: flex; align-items: center; gap: 20px;
    }
    .avatar {
      width: 60px; height: 60px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; color: #fff; flex-shrink: 0; border: 2px solid var(--border);
    }
    .profile-name  { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .profile-email { font-size: 13px; color: var(--text-muted); }
    .idqa-pill {
      margin-left: auto; display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 18px; border-radius: 12px; background: rgba(6,214,160,.08); border: 1px solid rgba(6,214,160,.2);
    }
    .idqa-score { font-size: 24px; font-weight: 900; color: var(--success); line-height: 1; }
    .idqa-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); }

    .cert-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cert-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 14px 16px; }
    .cert-card-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--text-muted); margin-bottom: 4px; }
    .cert-card-id    { font-size: 12px; font-weight: 600; color: var(--accent); font-family: monospace; }
    .cert-card-exp   { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .field-list { display: flex; flex-direction: column; gap: 8px; }
    .field-card {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 14px; padding: 16px 20px;
      display: flex; align-items: center; gap: 16px; transition: border-color .15s;
    }
    .field-card:hover { border-color: var(--border); }
    .field-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: rgba(6,214,160,.12); }
    .field-body { flex: 1; }
    .field-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--text-muted); margin-bottom: 3px; }
    .field-value { font-size: 15px; font-weight: 600; color: var(--text); }
    .badge-verified {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700;
      background: rgba(6,214,160,.1); color: var(--success);
      border: 1px solid rgba(6,214,160,.25); white-space: nowrap; flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // ── Users ─────────────────────────────────────────────────────
    const USERS = [
      {
        initials: 'AJ', avatarColor: '#aa1945', dobISO: '1992-03-24',
        certs: {
          foundation:  { id: 'OSMIO-FND-2024-00847', validTo: '2026-11-15' },
          numberplate: { id: 'OSMIO-NP-2024-03291',  validTo: '2026-11-15' },
        },
        fields: {
          firstName: { label: 'First Name',    value: 'Alex',                     verified: true, verifiedDate: '2024-11-16' },
          lastName:  { label: 'Last Name',     value: 'Johnson',                  verified: true, verifiedDate: '2024-11-16' },
          email:     { label: 'Email',         value: 'alex.johnson@example.com', verified: true, verifiedDate: '2024-11-15' },
          phone:     { label: 'Phone',         value: '+1 (512) 555-0147',        verified: true, verifiedDate: '2024-11-15' },
          dob:       { label: 'Date of Birth', value: '24 March 1992',            verified: true, verifiedDate: '2024-11-15' },
        }
      },
      {
        initials: 'SC', avatarColor: '#0d6e6e', dobISO: '2000-08-15',
        certs: {
          foundation:  { id: 'OSMIO-FND-2025-00312', validTo: '2027-04-20' },
          numberplate: { id: 'OSMIO-NP-2025-01184',  validTo: '2027-04-20' },
        },
        fields: {
          firstName: { label: 'First Name',    value: 'Sarah',                    verified: true, verifiedDate: '2025-04-21' },
          lastName:  { label: 'Last Name',     value: 'Chen',                     verified: true, verifiedDate: '2025-04-21' },
          email:     { label: 'Email',         value: 'sarah.chen@example.com',   verified: true, verifiedDate: '2025-04-20' },
          phone:     { label: 'Phone',         value: '+44 20 7946 0182',         verified: true, verifiedDate: '2025-04-20' },
          dob:       { label: 'Date of Birth', value: '15 August 2000',           verified: true, verifiedDate: '2025-04-20' },
        }
      },
      {
        initials: 'JO', avatarColor: '#5a4fcf', dobISO: '2008-11-03',
        certs: {
          foundation:  { id: 'OSMIO-FND-2025-01847', validTo: '2027-08-10' },
          numberplate: { id: 'OSMIO-NP-2025-02931',  validTo: '2027-08-10' },
        },
        fields: {
          firstName: { label: 'First Name',    value: 'Jamie',                    verified: true, verifiedDate: '2025-08-11' },
          lastName:  { label: 'Last Name',     value: 'Okonkwo',                  verified: true, verifiedDate: '2025-08-11' },
          email:     { label: 'Email',         value: 'jamie.okonkwo@example.com',verified: true, verifiedDate: '2025-08-10' },
          phone:     { label: 'Phone',         value: '+61 2 9876 5432',          verified: true, verifiedDate: '2025-08-10' },
          dob:       { label: 'Date of Birth', value: '3 November 2008',          verified: true, verifiedDate: '2025-08-10' },
        }
      },
    ];

    let currentUser      = null;
    let currentUserIndex = -1;

    function restoreUser() {
      const idx = parseInt(sessionStorage.getItem('moi_user_index') ?? '-1');
      if (idx >= 0 && idx < USERS.length) { currentUserIndex = idx; currentUser = USERS[idx]; }
    }

    // ── Helpers ───────────────────────────────────────────────────
    function logoSVG(size = 32) {
      return `<svg width="${size}" height="${size}" viewBox="0 0 40 44" fill="none">
        <defs><linearGradient id="mg" x1="4" y1="2" x2="36" y2="42" gradientUnits="userSpaceOnUse">
          <stop stop-color="#00c8f0"/><stop offset="1" stop-color="#005f88"/>
        </linearGradient></defs>
        <path d="M20 2L36 8.5V20C36 29.5 28 36.5 20 40C12 36.5 4 29.5 4 20V8.5L20 2Z" fill="url(#mg)"/>
        <path d="M20 2L36 8.5V20C36 29.5 28 36.5 20 40C12 36.5 4 29.5 4 20V8.5L20 2Z" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
        <circle cx="20" cy="17" r="6" fill="white" opacity="0.95"/>
        <ellipse cx="20" cy="30.5" rx="9" ry="6" fill="white" opacity="0.95"/>
      </svg>`;
    }

    function brandText() {
      return `<span class="brand-text"><span class="brand-moi">M</span>y <span class="brand-moi">O</span>wn <span class="brand-moi">I</span>nformation</span>`;
    }

    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function computeAge(dobISO) {
      const dob   = new Date(dobISO + 'T12:00:00');
      const today = new Date();
      let age = today.getFullYear() - dob.getFullYear();
      const m = today.getMonth() - dob.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
      return age;
    }

    const FIELD_ICONS = {
      firstName: `<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>`,
      lastName:  `<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>`,
      email:     `<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>`,
      phone:     `<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13 19.79 19.79 0 0 1 1.61 4.44 2 2 0 0 1 3.58 2.25h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.72 17.18z"/>`,
      dob:       `<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>`,
    };

    // ── Logout ───────────────────────────────────────────────────
    function doLogout() {
      sessionStorage.removeItem('moi_user_index');
      currentUser = null;
      currentUserIndex = -1;
      showLogin();
    }

    function hubLink() {
      return `<a href="index.html" style="display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--text-muted);text-decoration:none;padding:6px 12px;border-radius:8px;border:1px solid var(--border2);background:rgba(255,255,255,.03);transition:all .15s" onmouseover="this.style.color='var(--text)';this.style.borderColor='rgba(255,255,255,.15)'" onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='var(--border2)'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Demo Hub
      </a>`;
    }

    // ── Login ─────────────────────────────────────────────────────
    function showLogin() {
      document.getElementById('app').innerHTML = `
        <div class="screen">
          <header class="topbar">
            <div class="logo">${logoSVG(30)}${brandText()}</div>
            ${hubLink()}
          </header>
          <div class="login-wrap">
            <div class="login-card">
              <div>${logoSVG(44)}</div>
              <h1>${brandText()}</h1>
              <p>Select your account to access your encrypted identity vault.</p>

              <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;text-align:left">
                ${USERS.map((u, i) => `
                  <button id="ucard-${i}" onclick="selectUser(${i})" class="user-card">
                    <div class="user-avatar" style="background:${u.avatarColor}">${u.initials}</div>
                    <div>
                      <div class="user-name">${u.fields.firstName.value} ${u.fields.lastName.value} (${computeAge(u.dobISO)})</div>
                      <div class="user-cert">${u.certs.foundation.id}</div>
                    </div>
                  </button>`).join('')}
              </div>

              <div id="cert-detect-wrap" style="display:none;margin-bottom:18px"></div>

              <button id="access-btn" class="btn-primary" onclick="startVerification()" disabled>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Access My Vault
              </button>

              <div class="enc-note">
                <strong>End-to-end encrypted</strong>
                Your data is encrypted using the public key from your Osmio ID Pair. Only you can decrypt it with your private key.
              </div>
            </div>
          </div>
        </div>`;
    }

    function selectUser(i) {
      currentUserIndex = i;
      currentUser = USERS[i];
      sessionStorage.setItem('moi_user_index', i);

      USERS.forEach((_, j) => {
        const c = document.getElementById(`ucard-${j}`);
        if (!c) return;
        c.style.borderColor = j === i ? 'var(--accent)' : '';
        c.style.background  = j === i ? 'rgba(0,180,216,.08)' : '';
      });

      const wrap = document.getElementById('cert-detect-wrap');
      wrap.style.display = 'block';
      wrap.innerHTML = `
        <div class="cert-detect">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#06d6a0" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/>
          </svg>
          <div>
            <strong>Osmio ID Pair detected</strong>
            <span>${currentUser.certs.foundation.id} · Foundation</span>
          </div>
        </div>`;

      const btn = document.getElementById('access-btn');
      btn.disabled = false;
    }

    // ── Verification ──────────────────────────────────────────────
    const STEPS = [
      { label: 'Verifying certificate signature',  duration: 900 },
      { label: 'Validating Numberplate linkage',   duration: 800 },
      { label: 'Checking OSMIO trust chain',       duration: 700 },
      { label: 'Decrypting identity vault',        duration: 750 },
    ];

    function stepIconHTML(state) {
      if (state === 'done') return `<div class="step-icon done"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#06d6a0" stroke-width="3.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
      if (state === 'active') return `<div class="step-icon spinning"><div class="spin-ring"></div></div>`;
      return `<div class="step-icon pending"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#6a8a99" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/></svg></div>`;
    }

    function renderSteps(activeIndex, doneCount) {
      return STEPS.map((s, i) => {
        const state = i < doneCount ? 'done' : i === activeIndex ? 'active' : 'pending';
        return `<div class="verify-step ${state === 'done' ? 'done' : state === 'active' ? 'active' : ''}">
          ${stepIconHTML(state)}<span>${s.label}</span>
          ${state === 'done' ? `<span style="margin-left:auto;font-size:11px;font-weight:700;color:#06d6a0">✓</span>` : ''}
        </div>`;
      }).join('');
    }

    function showVerifying(activeIndex, doneCount) {
      const pct = Math.round((doneCount / STEPS.length) * 100);
      document.getElementById('verify-area').innerHTML = `
        <div class="verify-title">Verifying your Osmio ID Pair</div>
        ${renderSteps(activeIndex, doneCount)}
        <div class="verify-bar-track"><div class="verify-bar-fill" style="width:${pct}%"></div></div>`;
    }

    function startVerification() {
      const btn = document.getElementById('access-btn');
      btn.disabled = true;
      btn.innerHTML = `<div class="spin-ring" style="border-top-color:#fff;border-color:rgba(255,255,255,.3)"></div> Verifying…`;

      setTimeout(() => {
        btn.outerHTML = `<div id="verify-area" class="verify-area"></div>`;
        document.querySelector('.enc-note').style.display = 'none';
        let done = 0;
        showVerifying(0, 0);

        function runStep(i) {
          if (i >= STEPS.length) {
            document.getElementById('verify-area').innerHTML = `
              <div style="text-align:center;padding:12px 0">
                <div style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.3);border-radius:999px;font-size:14px;font-weight:700;color:#06d6a0">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
                  Identity verified
                </div>
              </div>`;
            setTimeout(() => {
              if (sessionStorage.getItem('moi_nc_request')) showConsent();
              else showDashboard();
            }, 600);
            return;
          }
          showVerifying(i, done);
          setTimeout(() => { done++; runStep(i + 1); }, STEPS[i].duration);
        }
        runStep(0);
      }, 300);
    }

    // ── Dashboard ─────────────────────────────────────────────────
    function showDashboard() {
      const fieldOrder = ['firstName', 'lastName', 'email', 'phone', 'dob'];
      const fieldCards = fieldOrder.map(key => {
        const f = currentUser.fields[key];
        return `<div class="field-card">
          <div class="field-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#06d6a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${FIELD_ICONS[key]}</svg>
          </div>
          <div class="field-body">
            <div class="field-label">${f.label}</div>
            <div class="field-value">${f.value}</div>
          </div>
          <span class="badge-verified">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            Attested ${fmtDate(f.verifiedDate)}
          </span>
        </div>`;
      }).join('');

      document.getElementById('app').innerHTML = `
        <div class="screen">
          <header class="topbar">
            <div class="logo">${logoSVG(30)}${brandText()}</div>
            <div style="display:flex;align-items:center;gap:12px">
              ${hubLink()}
              <div class="cert-chip"><span class="cert-chip-dot"></span>${currentUser.certs.foundation.id}</div>
              <button class="btn-logout" onclick="doLogout()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Sign out
              </button>
            </div>
          </header>
          <div class="screen-body">
            <div class="section-title">Identity</div>
            <div class="profile-header">
              <div class="avatar" style="background:${currentUser.avatarColor}">${currentUser.initials}</div>
              <div>
                <div class="profile-name">${currentUser.fields.firstName.value} ${currentUser.fields.lastName.value}</div>
                <div class="profile-email">${currentUser.fields.email.value}</div>
              </div>
              <div class="idqa-pill">
                <div class="idqa-score">12</div>
                <div class="idqa-label">IDQA</div>
              </div>
            </div>

            <div class="section-title">Osmio ID Pair</div>
            <div class="cert-row">
              <div class="cert-card">
                <div class="cert-card-label">Foundation</div>
                <div class="cert-card-id">${currentUser.certs.foundation.id}</div>
                <div class="cert-card-exp">Expires ${fmtDate(currentUser.certs.foundation.validTo)}</div>
              </div>
              <div class="cert-card">
                <div class="cert-card-label">Numberplate</div>
                <div class="cert-card-id">${currentUser.certs.numberplate.id}</div>
                <div class="cert-card-exp">Expires ${fmtDate(currentUser.certs.numberplate.validTo)}</div>
              </div>
            </div>

            <div class="section-title">My Information</div>
            <div class="field-list">${fieldCards}</div>
          </div>
        </div>`;
    }

    // ── Consent ───────────────────────────────────────────────────
    function showConsent() {
      if (!currentUser) { showLogin(); return; }
      const req = JSON.parse(sessionStorage.getItem('moi_nc_request') || 'null');
      if (!req) { showLogin(); return; }

      const age = computeAge(currentUser.dobISO);
      let question, answerLabel, answerPositive, isDOB = false;

      if (req.queryType === 'age_over') {
        const t = req.ageThreshold || 18;
        answerPositive = age >= t;
        question    = `Is ${currentUser.fields.firstName.value} older than ${t} years?`;
        answerLabel = answerPositive ? `Yes — ${t}+ confirmed` : `No — under ${t}`;
      } else if (req.queryType === 'age_under') {
        const t = req.ageThreshold || 30;
        answerPositive = age < t;
        question    = `Is ${currentUser.fields.firstName.value} under ${t} years of age?`;
        answerLabel = answerPositive ? `Yes — under ${t}` : `No — ${t} or older`;
      } else if (req.queryType === 'dob') {
        isDOB = true;
        answerPositive = true;
        question    = `${req.doctorName || req.appName} is requesting ${currentUser.fields.firstName.value}'s date of birth.`;
        answerLabel = currentUser.fields.dob.value;
      }

      function decide(granted) {
        sessionStorage.setItem('moi_nc_result', granted ? 'granted' : 'declined');
        if (granted && isDOB) {
          sessionStorage.setItem('moi_nc_dob',     currentUser.fields.dob.value);
          sessionStorage.setItem('moi_nc_patient', `${currentUser.fields.firstName.value} ${currentUser.fields.lastName.value}`);
        }
        sessionStorage.removeItem('moi_nc_request');
        location.href = req.returnTo + (granted ? '#granted' : '#declined');
      }
      window.consentGrant   = () => decide(true);
      window.consentDecline = () => decide(false);

      const answerBox = answerPositive
        ? `<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(6,214,160,.07);border:1px solid rgba(6,214,160,.2);border-radius:10px">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#06d6a0" stroke-width="2.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
            <div>
              <div style="font-size:12.5px;font-weight:700;color:#06d6a0">${answerLabel}</div>
              <div style="font-size:11.5px;color:var(--text-muted);margin-top:1px">${isDOB ? 'Your actual date of birth' : 'Derived from your attested date of birth · Not disclosed'}</div>
            </div>
          </div>`
        : `<div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(239,71,111,.07);border:1px solid rgba(239,71,111,.25);border-radius:10px">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef476f" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <div>
              <div style="font-size:12.5px;font-weight:700;color:#ef476f">${answerLabel}</div>
              <div style="font-size:11.5px;color:var(--text-muted);margin-top:1px">Access cannot be granted · Birthdate not disclosed</div>
            </div>
          </div>`;

      const buttons = answerPositive
        ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <button onclick="consentDecline()" style="padding:12px;border:1px solid var(--border2);border-radius:10px;background:rgba(255,255,255,.04);color:var(--text-muted);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='rgba(239,71,111,.3)';this.style.color='#ef476f'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text-muted)'">
              Decline
            </button>
            <button onclick="consentGrant()" style="padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 16px rgba(0,180,216,.3);transition:all .15s" onmouseover="this.style.opacity='.9'" onmouseout="this.style.opacity='1'">
              ${isDOB ? 'Share Date of Birth →' : 'Share Answer →'}
            </button>
          </div>`
        : `<button onclick="consentDecline()" style="width:100%;padding:12px;border:1px solid rgba(239,71,111,.3);border-radius:10px;background:rgba(239,71,111,.06);color:#ef476f;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer">
            Return to ${req.appName}
          </button>`;

      const privacyNote = isDOB
        ? 'Your <strong style="color:var(--text-mid)">actual date of birth</strong> will be shared with the requester.'
        : 'Only a <strong style="color:var(--text-mid)">No or Yes</strong> answer is sent — your date of birth stays in your vault.';

      document.getElementById('app').innerHTML = `
        <div class="screen">
          <header class="topbar">
            <div class="logo">${logoSVG(30)}${brandText()}</div>
            <div style="display:flex;align-items:center;gap:12px">
              ${hubLink()}
              <div class="cert-chip"><span class="cert-chip-dot"></span>${currentUser.certs.foundation.id}</div>
            </div>
          </header>
          <div class="login-wrap">
            <div class="login-card" style="max-width:440px;text-align:left">

              <div style="display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:24px">
                <div style="width:44px;height:44px;border-radius:12px;background:${req.requesterColor || '#1b2d3e'};display:flex;align-items:center;justify-content:center;font-size:20px">${req.requesterIcon || '🌐'}</div>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6a8a99" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                ${logoSVG(44)}
              </div>

              <div style="text-align:center;margin-bottom:22px">
                <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:6px">
                  ${isDOB ? 'Data Request' : 'No-Yes Protocol'}
                </div>
                <div style="font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px">${req.appName} is asking</div>
                <div style="font-size:13px;color:var(--text-muted);line-height:1.55">
                  ${isDOB ? 'Your actual date of birth is being requested.' : 'A No or Yes answer will be shared from your vault. Your actual date of birth is never disclosed.'}
                </div>
              </div>

              <div style="background:rgba(0,130,201,.07);border:1px solid rgba(0,130,201,.25);border-radius:14px;padding:20px;margin-bottom:18px">
                <div style="font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#0082c9;margin-bottom:10px">Question</div>
                <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px;line-height:1.4">${question}</div>
                ${answerBox}
              </div>

              <div style="display:flex;gap:8px;align-items:flex-start;padding:12px 14px;background:rgba(0,180,216,.04);border:1px solid rgba(0,180,216,.1);border-radius:9px;margin-bottom:22px">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" style="flex-shrink:0;margin-top:1px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <div style="font-size:12px;color:var(--text-muted);line-height:1.55">${privacyNote}</div>
              </div>

              ${buttons}
            </div>
          </div>
        </div>`;
    }

    // ── Boot ──────────────────────────────────────────────────────
    function init() {
      restoreUser();
      if (location.hash.slice(1) === 'consent') showConsent();
      else showLogin();
    }
    window.addEventListener('hashchange', init);
    init();
  </script>
</body>
</html>
